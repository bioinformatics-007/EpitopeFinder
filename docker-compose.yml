version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CLBTOPE_DB=/Vaxelan_2_0/tools/clbtope/clbtope/Database
    volumes:
      - ./Results:/Vaxelan_2_0/Results
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A backend.celery_app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CLBTOPE_DB=/Vaxelan_2_0/tools/clbtope/clbtope/Database
    volumes:
      - ./Results:/Vaxelan_2_0/Results
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
